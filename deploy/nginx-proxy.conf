# SKELION - nginx in front of the Node app (TLS termination + proxy)
# The Node app itself sets security headers and serves the SPA.
server {
    listen 443 ssl;
    http2 on;
    server_name skelionenterprises.com;

    # ssl_certificate     /etc/letsencrypt/live/skelionenterprises.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/skelionenterprises.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name skelionenterprises.com www.skelionenterprises.com;
    return 301 https://skelionenterprises.com$request_uri;
}
